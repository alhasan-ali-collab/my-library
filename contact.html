<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | منصة الواجب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- استدعاء وتكوين محرك Tailwind CSS المعتمد للمنصة -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { alwajeb: { purple: '#33004b', purpleLight: '#4c0070', gold: '#d4af37', dark: '#1e1b4b' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-['Cairo'] text-alwajeb-dark pb-12">

    <!-- لوحة البانر الرئيسي للتواصل -->
    <header class="max-w-6xl mx-auto px-4 mt-6">
        <div class="bg-gradient-to-br from-alwajeb-purple to-alwajeb-purpleLight text-white rounded-3xl p-8 text-center shadow-xl">
            <h1 class="text-2xl md:text-3xl font-black text-alwajeb-gold mb-1">💬 تواصل معنا</h1>
            <p class="text-purple-200 font-medium text-sm md:text-base">نحن هنا لمساعدتك والإجابة على جميع استفساراتك واقتراحاتك لتطوير المنصة</p>
        </div>
    </header>

    <!-- توزيع لوحة النماذج وبطاقات الدعم -->
    <main class="max-w-6xl mx-auto px-4 mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- قسم إرسال الرسالة الإلكترونية (ياخذ مساحة 2 كولوم) -->
        <div class="md:col-span-2 bg-white border border-slate-100 p-6 md:p-8 rounded-2xl shadow-sm space-y-4">
            <h2 class="text-lg font-black text-alwajeb-purple border-r-4 border-alwajeb-gold pr-2.5">أرسل لنا رسالة سريعاً</h2>
            
            <form id="contactForm" class="space-y-4 mt-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">الاسم الكريم</label>
                    <input type="text" placeholder="اكتب اسمك هنا..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold text-sm outline-none focus:border-alwajeb-purple focus:bg-white transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">البريد الإلكتروني</label>
                    <input type="email" placeholder="name@example.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold text-sm outline-none focus:border-alwajeb-purple focus:bg-white transition-all dir-ltr text-right">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">نص الرسالة أو الاستفسار</label>
                    <textarea rows="4" placeholder="اكتب ما يدور في ذهنك هنا يا بطل..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold text-sm outline-none focus:border-alwajeb-purple focus:bg-white transition-all"></textarea>
                </div>
                <button type="submit" class="w-full py-3.5 bg-alwajeb-purple hover:bg-alwajeb-purpleLight text-white font-black rounded-xl text-sm shadow-md hover:shadow-xl hover:-translate-y-0.5 transition-all">إرسال الرسالة إلى مختبر الدعم 🚀</button>
            </form>
        </div>

        <!-- قسم بطاقات الاتصال الجانبية (ياخذ مساحة 1 كولوم) -->
        <div class="space-y-4">
            <!-- بطاقة البريد الإلكتروني الرسمية المعروضة بالصورة -->
            <div class="bg-white border border-slate-100 p-5 rounded-2xl shadow-sm flex items-center gap-4">
                <div class="text-3xl bg-purple-50 p-3 rounded-xl">📩</div>
                <div>
                    <h4 class="text-xs font-bold text-slate-400">البريد الإلكتروني</h4>
                    <a href="mailto:support@alwajeb.net" class="text-sm font-black text-alwajeb-purple hover:underline">support@alwajeb.net</a>
                </div>
            </div>

            <!-- بطاقة وقت الاستجابة المبهجة للأطفال والدعم -->
            <div class="bg-white border border-slate-100 p-5 rounded-2xl shadow-sm flex items-center gap-4">
                <div class="text-3xl bg-amber-50 p-3 rounded-xl">⚡</div>
                <div>
                    <h4 class="text-xs font-bold text-slate-400">سرعة الاستجابة</h4>
                    <p class="text-sm font-black text-slate-700">خلال أقل من 24 ساعة عمل</p>
                </div>
            </div>
        </div>

    </main>

    <!-- سكريبت حقن الهيدر والفوتر القياسي النظيف -->
    <script src="components.js"></script>
</body>
</html>
