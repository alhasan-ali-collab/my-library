<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | منصة الواجب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .contact-container {
            max-width: 1000px;
            margin: 40px auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
        }

        /* كروت معلومات التواصل */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(91, 33, 182, 0.1);
        }

        .info-icon {
            font-size: 35px;
            background: rgba(91, 33, 182, 0.1);
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        .info-details h3 {
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .info-details p {
            color: #64748b;
            font-size: 0.95rem;
        }

        /* نموذج المراسلة */
        .contact-form {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(15, 23, 42, 0.08);
        }

        .contact-form h2 {
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: "Cairo";
            font-size: 1rem;
            transition: 0.3s;
            background: #f8fafc;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--secondary);
            background: white;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: "Cairo";
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(91, 33, 182, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(91, 33, 182, 0.3);
        }

        @media (max-width: 768px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
            .contact-form {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>💬 تواصل معنا</h1>
        <p>نحن هنا لمساعدتك والإجابة على جميع استفساراتك</p>
    </header>

    <div class="contact-container">
        
        <div class="contact-info">
            <div class="info-card">
                <div class="info-icon">📧</div>
                <div class="info-details">
                    <h3>البريد الإلكتروني</h3>
                    <p>support@alwajeb.net</p>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon">📱</div>
                <div class="info-details">
                    <h3>واتساب الدعم الفني</h3>
                    <p>0500000000</p>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon">📍</div>
                <div class="info-details">
                    <h3>أوقات العمل</h3>
                    <p>الأحد - الخميس (8 ص - 8 م)</p>
                </div>
            </div>
        </div>

        <div class="contact-form">
            <h2>أرسل لنا رسالة</h2>
            <form onsubmit="event.preventDefault(); alert('تم إرسال رسالتك بنجاح! سنتواصل معك قريباً.'); this.reset();">
                <div class="form-group">
                    <input type="text" placeholder="الاسم الكريم" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="البريد الإلكتروني" required>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="موضوع الرسالة" required>
                </div>
                <div class="form-group">
                    <textarea placeholder="اكتب رسالتك أو استفسارك هنا..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">إرسال الرسالة 🚀</button>
            </form>
        </div>

    </div>

    <script src="components.js"></script>

</body>
</html>
